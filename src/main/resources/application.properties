# Datasource (SQLite)
quarkus.datasource.db-kind=other
quarkus.datasource.jdbc.driver=org.sqlite.JDBC
quarkus.datasource.jdbc.url=jdbc:sqlite:simulador-investimentos.db
quarkus.datasource.jdbc.min-size=1
quarkus.datasource.jdbc.max-size=5

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.dialect=org.hibernate.community.dialect.SQLiteDialect
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# OpenAPI
quarkus.smallrye-openapi.info-title=API Simulador de Investimentos
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API REST para simulacao de investimentos em renda fixa (CDB, LCI, LCA). \
  Permite registrar clientes, autenticar via JWT e simular investimentos com calculo de juros compostos. \
  Os endpoints de simulacao requerem autenticacao - utilize /auth/registrar ou /auth/login para obter um token.
quarkus.smallrye-openapi.info-license-name=MIT
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=bearerAuth
quarkus.smallrye-openapi.security-scheme-description=Token JWT obtido via POST /auth/login ou POST /auth/registrar
quarkus.swagger-ui.always-include=true

# Logging
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."br.com.caixa".level=DEBUG
quarkus.log.category."org.flywaydb".level=INFO

# Jackson
quarkus.jackson.write-dates-as-timestamps=false

quarkus.health.extensions.enabled=true

# JWT
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=simulador-investimentos
smallrye.jwt.sign.key.location=privateKey.pem
jwt.duration.seconds=3600
